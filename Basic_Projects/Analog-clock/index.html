<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="/Basic_Projects/Analog-clock/clock-regular-full.svg" type="image/x-icon">
<title>3D Analog Watch</title>
<style>
  :root {
    --bg: #0a0a0c;
    --fg: #e8e0d4;
    --accent: #c9a96e;
    --muted: #5a5347;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Georgia', serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  canvas { display: block; }

  /* Time display overlay */
  #time-display {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.7;
    pointer-events: none;
    text-align: center;
  }

  #time-display .digital {
    font-size: 28px;
    letter-spacing: 4px;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }

  /* Brand overlay */
  #brand {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.5;
    pointer-events: none;
  }

  /* Hint */
  #hint {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    opacity: 0.6;
    pointer-events: none;
    animation: fadeHint 4s ease-in-out infinite;
  }

  @keyframes fadeHint {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }
</style>
</head>
<body>

<div id="brand">Chronos</div>
<div id="hint">Drag to rotate &middot; Scroll to zoom</div>
<div id="time-display">
  <div>Current Time</div>
  <div class="digital" id="digital-time">00:00:00</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0c);
scene.fog = new THREE.FogExp2(0x0a0a0c, 0.08);

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ─── Controls ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 3;
controls.maxDistance = 12;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.target.set(0, 0, 0);

// ─── Environment & Lighting ───
// Gradient background sphere
const bgGeo = new THREE.SphereGeometry(40, 32, 32);
const bgMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    uColor1: { value: new THREE.Color(0x0a0a0c) },
    uColor2: { value: new THREE.Color(0x1a1510) },
  },
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uColor1;
    uniform vec3 uColor2;
    varying vec3 vWorldPos;
    void main() {
      float t = smoothstep(-20.0, 20.0, vWorldPos.y);
      gl_FragColor = vec4(mix(uColor1, uColor2, t), 1.0);
    }
  `
});
scene.add(new THREE.Mesh(bgGeo, bgMat));

// Key light
const keyLight = new THREE.DirectionalLight(0xfff5e0, 3);
keyLight.position.set(4, 6, 4);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.near = 1;
keyLight.shadow.camera.far = 20;
keyLight.shadow.camera.left = -4;
keyLight.shadow.camera.right = 4;
keyLight.shadow.camera.top = 4;
keyLight.shadow.camera.bottom = -4;
keyLight.shadow.bias = -0.001;
scene.add(keyLight);

// Fill light
const fillLight = new THREE.DirectionalLight(0xc9d4ff, 0.6);
fillLight.position.set(-3, 2, -2);
scene.add(fillLight);

// Rim light
const rimLight = new THREE.PointLight(0xc9a96e, 2, 15);
rimLight.position.set(-2, -1, 4);
scene.add(rimLight);

// Ambient
const ambLight = new THREE.AmbientLight(0x1a1510, 0.8);
scene.add(ambLight);

// Subtle top spotlight
const spotLight = new THREE.SpotLight(0xfff8ee, 1.5, 20, Math.PI / 6, 0.5, 1);
spotLight.position.set(0, 8, 0);
spotLight.target.position.set(0, 0, 0);
scene.add(spotLight);
scene.add(spotLight.target);

// ─── Materials ───
const goldMat = new THREE.MeshStandardMaterial({
  color: 0xc9a96e,
  metalness: 0.95,
  roughness: 0.15,
});

const darkGoldMat = new THREE.MeshStandardMaterial({
  color: 0x8a7040,
  metalness: 0.9,
  roughness: 0.25,
});

const dialMat = new THREE.MeshStandardMaterial({
  color: 0x0d0d10,
  metalness: 0.3,
  roughness: 0.6,
});

const handMat = new THREE.MeshStandardMaterial({
  color: 0xc9a96e,
  metalness: 0.95,
  roughness: 0.1,
  emissive: 0x3a2a10,
  emissiveIntensity: 0.15,
});

const secondHandMat = new THREE.MeshStandardMaterial({
  color: 0xcc3333,
  metalness: 0.8,
  roughness: 0.2,
  emissive: 0x661111,
  emissiveIntensity: 0.3,
});

const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 0.0,
  roughness: 0.05,
  transmission: 0.9,
  thickness: 0.3,
  ior: 1.52,
  clearcoat: 1.0,
  clearcoatRoughness: 0.05,
  transparent: true,
  opacity: 0.3,
});

const bandMat = new THREE.MeshStandardMaterial({
  color: 0x1a1410,
  metalness: 0.0,
  roughness: 0.85,
});

const markerMat = new THREE.MeshStandardMaterial({
  color: 0xc9a96e,
  metalness: 0.95,
  roughness: 0.1,
  emissive: 0x3a2a10,
  emissiveIntensity: 0.2,
});

const indexMat = new THREE.MeshStandardMaterial({
  color: 0x666055,
  metalness: 0.7,
  roughness: 0.3,
});

// ─── Watch Group ───
const watchGroup = new THREE.Group();
scene.add(watchGroup);

// ─── Watch Case ───
// Main case body (torus-like ring)
const caseOuterRadius = 1.5;
const caseInnerRadius = 1.35;
const caseDepth = 0.45;

// Outer ring
const caseRingGeo = new THREE.TorusGeometry(
  (caseOuterRadius + caseInnerRadius) / 2,
  (caseOuterRadius - caseInnerRadius) / 2,
  32, 64
);
const caseRing = new THREE.Mesh(caseRingGeo, goldMat);
caseRing.castShadow = true;
caseRing.receiveShadow = true;
watchGroup.add(caseRing);

// Case back
const caseBackGeo = new THREE.CylinderGeometry(caseOuterRadius, caseOuterRadius, 0.08, 64);
const caseBack = new THREE.Mesh(caseBackGeo, darkGoldMat);
caseBack.position.y = -caseDepth / 2;
caseBack.receiveShadow = true;
watchGroup.add(caseBack);

// Case back engraving ring
const engraveRingGeo = new THREE.TorusGeometry(caseOuterRadius * 0.8, 0.015, 8, 64);
const engraveRing = new THREE.Mesh(engraveRingGeo, goldMat);
engraveRing.rotation.x = Math.PI / 2;
engraveRing.position.y = -caseDepth / 2 - 0.03;
watchGroup.add(engraveRing);

// Case front bezel
const bezelGeo = new THREE.TorusGeometry(caseOuterRadius * 0.97, 0.04, 16, 64);
const bezel = new THREE.Mesh(bezelGeo, goldMat);
bezel.rotation.x = Math.PI / 2;
bezel.position.y = caseDepth / 2 - 0.05;
watchGroup.add(bezel);

// ─── Dial (Watch Face) ───
const dialGeo = new THREE.CylinderGeometry(caseInnerRadius, caseInnerRadius, 0.06, 64);
const dial = new THREE.Mesh(dialGeo, dialMat);
dial.position.y = -0.02;
dial.receiveShadow = true;
watchGroup.add(dial);

// Inner dial ring (minute track border)
const innerRingGeo = new THREE.TorusGeometry(caseInnerRadius * 0.92, 0.008, 8, 64);
const innerRing = new THREE.Mesh(innerRingGeo, markerMat);
innerRing.rotation.x = Math.PI / 2;
innerRing.position.y = 0.04;
watchGroup.add(innerRing);

// ─── Hour Markers ───
for (let i = 0; i < 12; i++) {
  const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
  const isMainHour = (i % 3 === 0);
  const markerLength = isMainHour ? 0.22 : 0.14;
  const markerWidth = isMainHour ? 0.06 : 0.03;
  const markerRadius = caseInnerRadius * 0.82;

  const markerGeo = new THREE.BoxGeometry(markerWidth, 0.025, markerLength);
  const marker = new THREE.Mesh(markerGeo, isMainHour ? markerMat : indexMat);
  marker.position.x = Math.cos(angle) * markerRadius;
  marker.position.z = Math.sin(angle) * markerRadius;
  marker.position.y = 0.04;
  marker.rotation.y = -angle + Math.PI / 2;
  watchGroup.add(marker);

  // Add small dot markers for main hours
  if (isMainHour) {
    const dotGeo = new THREE.SphereGeometry(0.025, 12, 12);
    const dot = new THREE.Mesh(dotGeo, markerMat);
    const dotRadius = caseInnerRadius * 0.88;
    dot.position.x = Math.cos(angle) * dotRadius;
    dot.position.z = Math.sin(angle) * dotRadius;
    dot.position.y = 0.045;
    watchGroup.add(dot);
  }
}

// ─── Minute Tick Marks ───
for (let i = 0; i < 60; i++) {
  if (i % 5 === 0) continue; // Skip hour positions
  const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
  const tickRadius = caseInnerRadius * 0.87;

  const tickGeo = new THREE.BoxGeometry(0.012, 0.015, 0.06);
  const tick = new THREE.Mesh(tickGeo, indexMat);
  tick.position.x = Math.cos(angle) * tickRadius;
  tick.position.z = Math.sin(angle) * tickRadius;
  tick.position.y = 0.035;
  tick.rotation.y = -angle + Math.PI / 2;
  watchGroup.add(tick);
}

// ─── Brand Text on Dial (using thin boxes to simulate text) ───
// "CHRONOS" text representation — small horizontal bars
function createTextLines(text, startX, startZ, scale, yPos) {
  const group = new THREE.Group();
  // Simple representation: horizontal bar
  const barGeo = new THREE.BoxGeometry(0.6 * scale, 0.008, 0.025 * scale);
  const bar = new THREE.Mesh(barGeo, markerMat);
  bar.position.y = yPos;
  group.add(bar);

  // Second shorter bar below
  const bar2Geo = new THREE.BoxGeometry(0.35 * scale, 0.008, 0.018 * scale);
  const bar2 = new THREE.Mesh(bar2Geo, indexMat);
  bar2.position.set(0, yPos, 0.06 * scale);
  group.add(bar2);

  group.position.set(startX, 0, startZ);
  return group;
}

const brandText = createTextLines("CHRONOS", 0, -0.45, 1.0, 0.05);
watchGroup.add(brandText);

// "AUTOMATIC" text below center
const autoText = createTextLines("AUTOMATIC", 0, 0.55, 0.65, 0.05);
watchGroup.add(autoText);

// ─── Sub-dial (small seconds) ───
const subDialRadius = 0.28;
const subDialGeo = new THREE.CylinderGeometry(subDialRadius, subDialRadius, 0.005, 32);
const subDial = new THREE.Mesh(subDialGeo, dialMat);
subDial.position.set(0, 0.04, 0.35);
watchGroup.add(subDial);

const subDialRingGeo = new THREE.TorusGeometry(subDialRadius, 0.008, 8, 32);
const subDialRing = new THREE.Mesh(subDialRingGeo, indexMat);
subDialRing.rotation.x = Math.PI / 2;
subDialRing.position.set(0, 0.045, 0.35);
watchGroup.add(subDialRing);

// Sub-dial ticks
for (let i = 0; i < 12; i++) {
  const angle = (i / 12) * Math.PI * 2;
  const tickR = subDialRadius * 0.85;
  const tickGeo = new THREE.BoxGeometry(0.008, 0.01, 0.04);
  const tick = new THREE.Mesh(tickGeo, indexMat);
  tick.position.set(
    Math.cos(angle) * tickR,
    0.048,
    0.35 + Math.sin(angle) * tickR
  );
  tick.rotation.y = -angle;
  watchGroup.add(tick);
}

// ─── Watch Hands ───
// Helper: create a tapered hand shape
function createHand(shape, material, yOffset) {
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: 0.018,
    bevelEnabled: true,
    bevelThickness: 0.003,
    bevelSize: 0.003,
    bevelSegments: 2,
  });
  const mesh = new THREE.Mesh(geo, material);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.y = yOffset;
  mesh.castShadow = true;
  return mesh;
}

// Hour hand
const hourShape = new THREE.Shape();
hourShape.moveTo(-0.04, -0.12);
hourShape.lineTo(-0.03, -0.12);
hourShape.lineTo(-0.025, 0.75);
hourShape.lineTo(0, 0.82);
hourShape.lineTo(0.025, 0.75);
hourShape.lineTo(0.03, -0.12);
hourShape.lineTo(0.04, -0.12);
hourShape.lineTo(0, -0.16);
hourShape.closePath();

const hourHand = createHand(hourShape, handMat, 0.06);
const hourPivot = new THREE.Group();
hourPivot.add(hourHand);
watchGroup.add(hourPivot);

// Minute hand
const minuteShape = new THREE.Shape();
minuteShape.moveTo(-0.03, -0.15);
minuteShape.lineTo(-0.02, -0.15);
minuteShape.lineTo(-0.015, 1.05);
minuteShape.lineTo(0, 1.15);
minuteShape.lineTo(0.015, 1.05);
minuteShape.lineTo(0.02, -0.15);
minuteShape.lineTo(0.03, -0.15);
minuteShape.lineTo(0, -0.2);
minuteShape.closePath();

const minuteHand = createHand(minuteShape, handMat, 0.08);
const minutePivot = new THREE.Group();
minutePivot.add(minuteHand);
watchGroup.add(minutePivot);

// Second hand
const secondShape = new THREE.Shape();
secondShape.moveTo(-0.008, -0.25);
secondShape.lineTo(0.008, -0.25);
secondShape.lineTo(0.005, 1.2);
secondShape.lineTo(0, 1.3);
secondShape.lineTo(-0.005, 1.2);
secondShape.closePath();

const secondHand = createHand(secondShape, secondHandMat, 0.10);
const secondPivot = new THREE.Group();
secondPivot.add(secondHand);
watchGroup.add(secondPivot);

// Sub-dial second hand
const subSecondShape = new THREE.Shape();
subSecondShape.moveTo(-0.005, -0.08);
subSecondShape.lineTo(0.005, -0.08);
subSecondShape.lineTo(0.003, 0.2);
subSecondShape.lineTo(0, 0.24);
subSecondShape.lineTo(-0.003, 0.2);
subSecondShape.closePath();

const subSecondHand = createHand(subSecondShape, secondHandMat, 0.10);
const subSecondPivot = new THREE.Group();
subSecondPivot.add(subSecondHand);
subSecondPivot.position.set(0, 0, 0.35);
watchGroup.add(subSecondPivot);

// ─── Center Cap ───
const capGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.06, 16);
const cap = new THREE.Mesh(capGeo, goldMat);
cap.position.y = 0.12;
watchGroup.add(cap);

const capTopGeo = new THREE.SphereGeometry(0.04, 16, 16);
const capTop = new THREE.Mesh(capTopGeo, goldMat);
capTop.position.y = 0.16;
watchGroup.add(capTop);

// ─── Glass Crystal ───
const glassGeo = new THREE.CylinderGeometry(caseInnerRadius - 0.02, caseInnerRadius - 0.02, 0.08, 64);
const glass = new THREE.Mesh(glassGeo, glassMat);
glass.position.y = caseDepth / 2 - 0.02;
watchGroup.add(glass);

// Glass dome
const domeGeo = new THREE.SphereGeometry(caseInnerRadius - 0.02, 64, 32, 0, Math.PI * 2, 0, Math.PI / 2);
const dome = new THREE.Mesh(domeGeo, glassMat);
dome.position.y = caseDepth / 2 + 0.02;
dome.scale.y = 0.15;
watchGroup.add(dome);

// ─── Crown (Winding Knob) ───
const crownGeo = new THREE.CylinderGeometry(0.1, 0.08, 0.25, 16);
const crown = new THREE.Mesh(crownGeo, goldMat);
crown.rotation.z = Math.PI / 2;
crown.position.set(caseOuterRadius + 0.12, 0, 0);
crown.castShadow = true;
watchGroup.add(crown);

// Crown ridges
for (let i = 0; i < 12; i++) {
  const ridgeGeo = new THREE.BoxGeometry(0.01, 0.22, 0.005);
  const ridge = new THREE.Mesh(ridgeGeo, darkGoldMat);
  const angle = (i / 12) * Math.PI * 2;
  ridge.position.set(
    caseOuterRadius + 0.12 + Math.cos(angle) * 0.085,
    Math.sin(angle) * 0.085,
    0
  );
  ridge.rotation.z = Math.PI / 2;
  ridge.rotation.y = angle;
  watchGroup.add(ridge);
}

// Crown guard
const guardGeo = new THREE.BoxGeometry(0.2, 0.16, 0.12);
const guard = new THREE.Mesh(guardGeo, goldMat);
guard.position.set(caseOuterRadius - 0.02, 0, 0);
watchGroup.add(guard);

// ─── Lugs (Watch to band connectors) ───
function createLug(x, z) {
  const lugGeo = new THREE.BoxGeometry(0.18, 0.3, 0.2);
  const lug = new THREE.Mesh(lugGeo, goldMat);
  lug.position.set(x, -0.05, z);
  lug.castShadow = true;
  watchGroup.add(lug);

  // Lug hole
  const holeGeo = new THREE.CylinderGeometry(0.035, 0.035, 0.22, 12);
  const holeMat = new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 0.5, roughness: 0.8 });
  const hole = new THREE.Mesh(holeGeo, holeMat);
  hole.rotation.x = Math.PI / 2;
  hole.position.set(x, -0.02, z);
  watchGroup.add(hole);

  // Spring bar
  const barGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.24, 8);
  const bar = new THREE.Mesh(barGeo, goldMat);
  bar.rotation.x = Math.PI / 2;
  bar.position.set(x, -0.02, z);
  watchGroup.add(bar);
}

createLug(-0.5, -caseOuterRadius - 0.08);
createLug(0.5, -caseOuterRadius - 0.08);
createLug(-0.5, caseOuterRadius + 0.08);
createLug(0.5, caseOuterRadius + 0.08);

// ─── Watch Band ───
function createBandSegment(zPos, length, curveDir) {
  const bandGroup = new THREE.Group();

  // Main strap
  const strapGeo = new THREE.BoxGeometry(0.7, 0.1, length);
  const strap = new THREE.Mesh(strapGeo, bandMat);
  strap.position.set(0, 0, 0);
  strap.castShadow = true;
  strap.receiveShadow = true;
  bandGroup.add(strap);

  // Edge stitching
  const stitchMat = new THREE.MeshStandardMaterial({ color: 0x3a3020, metalness: 0.0, roughness: 0.9 });
  for (let side of [-1, 1]) {
    const stitchGeo = new THREE.BoxGeometry(0.015, 0.11, length - 0.05);
    const stitch = new THREE.Mesh(stitchGeo, stitchMat);
    stitch.position.set(side * 0.36, 0, 0);
    bandGroup.add(stitch);
  }

  // Stitch marks
  for (let i = 0; i < Math.floor(length / 0.15); i++) {
    for (let side of [-1, 1]) {
      const markGeo = new THREE.BoxGeometry(0.02, 0.112, 0.008);
      const mark = new THREE.Mesh(markGeo, stitchMat);
      mark.position.set(side * 0.36, 0, -length / 2 + 0.1 + i * 0.15);
      bandGroup.add(mark);
    }
  }

  bandGroup.position.set(0, -0.08, zPos);
  bandGroup.rotation.x = curveDir * 0.15;

  return bandGroup;
}

// Top band (towards 12 o'clock)
const topBand1 = createBandSegment(-caseOuterRadius - 0.25, 1.8, -1);
watchGroup.add(topBand1);
const topBand2 = createBandSegment(-caseOuterRadius - 2.0, 1.5, -1);
topBand2.rotation.x = -0.3;
watchGroup.add(topBand2);

// Bottom band (towards 6 o'clock)
const bottomBand1 = createBandSegment(caseOuterRadius + 0.25, 1.8, 1);
watchGroup.add(bottomBand1);
const bottomBand2 = createBandSegment(caseOuterRadius + 2.0, 1.5, 1);
bottomBand2.rotation.x = 0.3;
watchGroup.add(bottomBand2);

// Buckle on bottom band
const buckleGeo = new THREE.BoxGeometry(0.5, 0.04, 0.3);
const buckle = new THREE.Mesh(buckleGeo, goldMat);
buckle.position.set(0, -0.06, caseOuterRadius + 3.3);
watchGroup.add(buckle);

const buckleFrame1Geo = new THREE.BoxGeometry(0.04, 0.12, 0.32);
const buckleFrame1 = new THREE.Mesh(buckleFrame1Geo, goldMat);
buckleFrame1.position.set(-0.23, -0.06, caseOuterRadius + 3.3);
watchGroup.add(buckleFrame1);

const buckleFrame2 = buckleFrame1.clone();
buckleFrame2.position.x = 0.23;
watchGroup.add(buckleFrame2);

// ─── Floating Particles ───
const particleCount = 80;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);

for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 15;
  particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 10;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 15;
  particleSizes[i] = Math.random() * 3 + 1;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  uniforms: {
    uTime: { value: 0 },
    uColor: { value: new THREE.Color(0xc9a96e) },
  },
  vertexShader: `
    attribute float size;
    uniform float uTime;
    varying float vAlpha;
    void main() {
      vec3 pos = position;
      pos.y += sin(uTime * 0.3 + position.x * 0.5) * 0.3;
      pos.x += cos(uTime * 0.2 + position.z * 0.4) * 0.2;
      vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
      gl_PointSize = size * (6.0 / -mvPosition.z);
      gl_Position = projectionMatrix * mvPosition;
      vAlpha = smoothstep(0.0, 3.0, size) * 0.4;
    }
  `,
  fragmentShader: `
    uniform vec3 uColor;
    varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float alpha = smoothstep(0.5, 0.1, d) * vAlpha;
      gl_FragColor = vec4(uColor, alpha);
    }
  `
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ─── Floor Reflection Plane ───
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0a0a0c,
  metalness: 0.8,
  roughness: 0.3,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -2.5;
floor.receiveShadow = true;
scene.add(floor);

// ─── Digital Time Display ───
const digitalTimeEl = document.getElementById('digital-time');

// ─── Animation Loop ───
const clock = new THREE.Clock();

function updateWatchHands() {
  const now = new Date();
  const hours = now.getHours() % 12;
  const minutes = now.getMinutes();
  const seconds = now.getSeconds();
  const millis = now.getMilliseconds();

  // Smooth second calculation
  const smoothSeconds = seconds + millis / 1000;
  const smoothMinutes = minutes + smoothSeconds / 60;
  const smoothHours = hours + smoothMinutes / 60;

  // Rotation angles (clockwise from 12 o'clock)
  // 12 o'clock = -PI/2 in our coordinate system
  const secondAngle = -(smoothSeconds / 60) * Math.PI * 2;
  const minuteAngle = -(smoothMinutes / 60) * Math.PI * 2;
  const hourAngle = -(smoothHours / 12) * Math.PI * 2;

  secondPivot.rotation.y = secondAngle;
  minutePivot.rotation.y = minuteAngle;
  hourPivot.rotation.y = hourAngle;
  subSecondPivot.rotation.y = secondAngle;

  // Update digital display
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(minutes).padStart(2, '0');
  const s = String(seconds).padStart(2, '0');
  digitalTimeEl.textContent = `${h}:${m}:${s}`;
}

function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();

  // Update particle time
  particleMat.uniforms.uTime.value = elapsed;

  // Subtle watch breathing motion
  watchGroup.position.y = Math.sin(elapsed * 0.5) * 0.03;
  watchGroup.rotation.x = Math.sin(elapsed * 0.3) * 0.01;

  // Update hands in real time
  updateWatchHands();

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Stop auto-rotate on interaction, resume after idle
let idleTimer;
controls.addEventListener('start', () => {
  controls.autoRotate = false;
  clearTimeout(idleTimer);
});
controls.addEventListener('end', () => {
  idleTimer = setTimeout(() => {
    controls.autoRotate = true;
  }, 4000);
});
</script>
</body>
