<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | Smart Finance Manager</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">💰</span>
                <h1>ExpenseTracker</h1>
            </div>
            <button class="btn btn-secondary" id="exportBtn">📥 Export CSV</button>
        </header>

        <!-- Dashboard Cards -->
        <section class="dashboard">
            <div class="card card-balance">
                <div class="card-icon">💳</div>
                <div class="card-content">
                    <p class="card-label">Total Balance</p>
                    <h2 class="card-value" id="totalBalance">$0.00</h2>
                </div>
            </div>
            <div class="card card-income">
                <div class="card-icon">📈</div>
                <div class="card-content">
                    <p class="card-label">Total Income</p>
                    <h2 class="card-value" id="totalIncome">$0.00</h2>
                </div>
            </div>
            <div class="card card-expense">
                <div class="card-icon">📉</div>
                <div class="card-content">
                    <p class="card-label">Total Expenses</p>
                    <h2 class="card-value" id="totalExpense">$0.00</h2>
                </div>
            </div>
        </section>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Left Column: Form & Chart -->
            <div class="column-left">
                <!-- Add Transaction Form -->
                <section class="form-section">
                    <h3>Add Transaction</h3>
                    <form id="transactionForm" class="transaction-form">
                        <div class="form-group">
                            <label for="description">Description</label>
                            <input type="text" id="description" placeholder="e.g., Grocery Shopping" required>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="amount">Amount</label>
                                <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required>
                            </div>
                            <div class="form-group">
                                <label for="type">Type</label>
                                <select id="type" required>
                                    <option value="expense">Expense</option>
                                    <option value="income">Income</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="category">Category</label>
                                <select id="category" required>
                                    <option value="food">🍔 Food & Dining</option>
                                    <option value="transport">🚗 Transport</option>
                                    <option value="shopping">🛍️ Shopping</option>
                                    <option value="entertainment">🎬 Entertainment</option>
                                    <option value="bills">📋 Bills & Utilities</option>
                                    <option value="health">🏥 Health</option>
                                    <option value="salary">💼 Salary</option>
                                    <option value="freelance">💻 Freelance</option>
                                    <option value="investment">📊 Investment</option>
                                    <option value="other">📦 Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="date">Date</label>
                                <input type="date" id="date" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full">
                            <span>➕ Add Transaction</span>
                        </button>
                    </form>
                </section>

                <!-- Chart Section -->
                <section class="chart-section">
                    <h3>Expense Breakdown</h3>
                    <div class="chart-container">
                        <canvas id="expenseChart"></canvas>
                        <div id="chartLegend" class="chart-legend"></div>
                    </div>
                </section>
            </div>

            <!-- Right Column: Transactions List -->
            <div class="column-right">
                <section class="transactions-section">
                    <div class="section-header">
                        <h3>Recent Transactions</h3>
                        <div class="filters">
                            <button class="filter-btn active" data-filter="all">All</button>
                            <button class="filter-btn" data-filter="income">Income</button>
                            <button class="filter-btn" data-filter="expense">Expense</button>
                        </div>
                    </div>
                    
                    <div class="transactions-list" id="transactionsList">
                        <!-- Transactions injected here -->
                    </div>
                    
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">📭</div>
                        <p>No transactions yet</p>
                        <p class="empty-sub">Add your first transaction to get started</p>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Transaction</h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="editDescription">Description</label>
                    <input type="text" id="editDescription" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editAmount">Amount</label>
                        <input type="number" id="editAmount" step="0.01" min="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="editCategory">Category</label>
                        <select id="editCategory" required>
                            <option value="food">🍔 Food & Dining</option>
                            <option value="transport">🚗 Transport</option>
                            <option value="shopping">🛍️ Shopping</option>
                            <option value="entertainment">🎬 Entertainment</option>
                            <option value="bills">📋 Bills & Utilities</option>
                            <option value="health">🏥 Health</option>
                            <option value="salary">💼 Salary</option>
                            <option value="freelance">💻 Freelance</option>
                            <option value="investment">📊 Investment</option>
                            <option value="other">📦 Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editDate">Date</label>
                    <input type="date" id="editDate" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelEdit">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
